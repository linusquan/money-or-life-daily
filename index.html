<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money or Life 美股频道 - 每日摘要</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }
    header {
      background: #1a1a2e;
      border-bottom: 2px solid #e94560;
      padding: 20px 0;
      text-align: center;
    }
    header h1 {
      font-size: 1.6em;
      color: #fff;
      margin-bottom: 4px;
    }
    header .subtitle {
      color: #aaa;
      font-size: 0.9em;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .date-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .date-nav label {
      font-size: 0.95em;
      color: #ccc;
    }
    .date-nav select {
      background: #1a1a2e;
      color: #fff;
      border: 1px solid #333;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
    }
    .date-nav select:hover { border-color: #e94560; }
    .date-nav .nav-btn {
      background: #1a1a2e;
      color: #fff;
      border: 1px solid #333;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
    }
    .date-nav .nav-btn:hover { border-color: #e94560; background: #16213e; }
    .date-nav .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 1.1em;
    }
    .video-card {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #222;
    }
    .video-card:hover { border-color: #333; }
    .video-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .video-title {
      font-size: 1.25em;
      font-weight: 600;
      color: #fff;
      flex: 1;
    }
    .video-title a {
      color: #fff;
      text-decoration: none;
    }
    .video-title a:hover { color: #e94560; }
    .video-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .meta-tag {
      background: #16213e;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.82em;
      color: #aaa;
    }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 0.9em;
      color: #e94560;
      font-weight: 600;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #222;
    }
    .section-content {
      font-size: 0.92em;
      line-height: 1.7;
      color: #ccc;
    }
    .section-content ul {
      padding-left: 20px;
    }
    .section-content li {
      margin-bottom: 6px;
    }
    .stocks-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stock-tag {
      background: #e94560;
      color: #fff;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.82em;
      font-weight: 600;
    }
    .stock-tag.secondary {
      background: #16213e;
      color: #e94560;
      border: 1px solid #e94560;
    }
    .community-post {
      background: #16213e;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 3px solid #e94560;
    }
    .community-post .post-date {
      font-size: 0.82em;
      color: #888;
      margin-bottom: 6px;
    }
    .community-post .post-content {
      font-size: 0.9em;
      line-height: 1.6;
      color: #ccc;
    }
    .post-engagement {
      margin-top: 8px;
      font-size: 0.8em;
      color: #666;
    }
    .trade-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #16213e;
      border-radius: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .trade-action {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.78em;
      font-weight: 700;
      text-transform: uppercase;
    }
    .trade-action.buy, .trade-action.add { background: #0d7c3e; color: #fff; }
    .trade-action.sell, .trade-action.trim { background: #c0392b; color: #fff; }
    .trade-action.hold { background: #2980b9; color: #fff; }
    .trade-action.watching { background: #7f8c8d; color: #fff; }
    .trade-action.call, .trade-action.put, .trade-action.covered-call { background: #8e44ad; color: #fff; }
    .trade-ticker {
      font-weight: 700;
      color: #e94560;
      font-size: 0.95em;
      min-width: 50px;
    }
    .trade-detail {
      font-size: 0.82em;
      color: #999;
    }
    .trade-reasoning {
      font-size: 0.85em;
      color: #bbb;
      width: 100%;
      margin-top: 2px;
    }
    .analysis-card {
      background: #16213e;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 3px solid #2980b9;
    }
    .analysis-card .analysis-ticker {
      font-weight: 700;
      color: #e94560;
      font-size: 1em;
      margin-bottom: 8px;
    }
    .analysis-card .analysis-row {
      font-size: 0.85em;
      line-height: 1.6;
      color: #ccc;
      margin-bottom: 4px;
    }
    .analysis-card .analysis-label {
      color: #e94560;
      font-weight: 600;
    }
    .analysis-card .risk-highlight {
      color: #e67e22;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 0.85em;
    }
    th {
      background: #16213e;
      padding: 8px 10px;
      text-align: left;
      color: #e94560;
      font-weight: 600;
      border-bottom: 1px solid #333;
    }
    td {
      padding: 6px 10px;
      border-bottom: 1px solid #1a1a2e;
      color: #ccc;
    }
    tr:hover td { background: #16213e; }
    footer {
      text-align: center;
      padding: 30px;
      color: #444;
      font-size: 0.8em;
    }
    @media (max-width: 600px) {
      .video-header { flex-direction: column; }
      .video-title { font-size: 1.1em; }
      .container { padding: 16px 10px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Money or Life 美股频道</h1>
    <div class="subtitle">每日内容摘要 | @Money_or_Life</div>
  </header>

  <div class="container">
    <div class="date-nav">
      <button class="nav-btn" id="prevBtn" onclick="navDate(-1)">&larr; 前一天</button>
      <label for="dateSelect">选择日期：</label>
      <select id="dateSelect" onchange="loadDate(this.value)"></select>
      <button class="nav-btn" id="nextBtn" onclick="navDate(1)">后一天 &rarr;</button>
    </div>
    <div id="content">
      <div class="no-data">正在加载...</div>
    </div>
  </div>

  <footer>
    自动生成 by Claude Code | 数据来源: YouTube @Money_or_Life
  </footer>

  <script>
    let availableDates = [];
    let currentIndex = 0;
    const BASE = location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');

    async function init() {
      try {
        const res = await fetch(`${BASE}/data/index.json?_=${Date.now()}`);
        availableDates = await res.json();
        availableDates.sort().reverse();

        const select = document.getElementById('dateSelect');
        availableDates.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          select.appendChild(opt);
        });

        if (availableDates.length > 0) {
          loadDate(availableDates[0]);
        } else {
          document.getElementById('content').innerHTML = '<div class="no-data">暂无数据</div>';
        }
      } catch (e) {
        document.getElementById('content').innerHTML = '<div class="no-data">加载失败，请稍后再试</div>';
      }
    }

    async function loadDate(date) {
      currentIndex = availableDates.indexOf(date);
      document.getElementById('dateSelect').value = date;
      updateNavButtons();

      const content = document.getElementById('content');
      content.innerHTML = '<div class="no-data">加载中...</div>';

      try {
        const res = await fetch(`${BASE}/data/${date}.json?_=${Date.now()}`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        renderDay(data, date);
      } catch (e) {
        content.innerHTML = `<div class="no-data">${date} 暂无数据</div>`;
      }
    }

    function navDate(dir) {
      const newIndex = currentIndex - dir;
      if (newIndex >= 0 && newIndex < availableDates.length) {
        loadDate(availableDates[newIndex]);
      }
    }

    function updateNavButtons() {
      document.getElementById('prevBtn').disabled = currentIndex >= availableDates.length - 1;
      document.getElementById('nextBtn').disabled = currentIndex <= 0;
    }

    function renderDay(data, date) {
      const content = document.getElementById('content');
      let html = '';

      if (data.videos && data.videos.length > 0) {
        data.videos.forEach((v, i) => {
          html += renderVideoCard(v, i + 1, data.videos.length);
        });
      }

      if (data.communityPosts && data.communityPosts.length > 0) {
        html += '<div class="video-card">';
        html += '<div class="section-title" style="font-size:1.1em; border-bottom:none; margin-bottom:12px;">社区帖子</div>';
        data.communityPosts.forEach(p => {
          html += `<div class="community-post">
            <div class="post-date">${p.date || ''}</div>
            <div class="post-content">${p.content}</div>
            ${p.likes ? `<div class="post-engagement">${p.likes} 赞 | ${p.comments || 0} 评论</div>` : ''}
          </div>`;
        });
        html += '</div>';
      }

      if (!html) {
        html = `<div class="no-data">${date} 没有新内容发布</div>`;
      }

      content.innerHTML = html;
    }

    function renderVideoCard(v, num, total) {
      const countLabel = total > 1 ? `<span style="color:#666;font-size:0.8em;">（${num}/${total}）</span>` : '';
      let html = `<div class="video-card">`;

      html += `<div class="video-header">
        <div class="video-title">${v.url ? `<a href="${v.url}" target="_blank">${v.title}</a>` : v.title} ${countLabel}</div>
      </div>`;

      html += `<div class="video-meta">`;
      if (v.date) html += `<span class="meta-tag">${v.date}</span>`;
      if (v.duration) html += `<span class="meta-tag">${v.duration}</span>`;
      if (v.views) html += `<span class="meta-tag">${v.views} 观看</span>`;
      if (v.likes) html += `<span class="meta-tag">${v.likes} 赞</span>`;
      if (v.comments) html += `<span class="meta-tag">${v.comments} 评论</span>`;
      html += `</div>`;

      if (v.summary) {
        html += `<div class="section">
          <div class="section-title">内容摘要</div>
          <div class="section-content">${v.summary}</div>
        </div>`;
      }

      if (v.keyPoints && v.keyPoints.length > 0) {
        html += `<div class="section">
          <div class="section-title">核心要点</div>
          <div class="section-content"><ul>${v.keyPoints.map(p => `<li>${p}</li>`).join('')}</ul></div>
        </div>`;
      }

      if (v.table) {
        html += `<div class="section">
          <div class="section-title">${v.table.title || '数据对比'}</div>
          <table><thead><tr>${v.table.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${v.table.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>
        </div>`;
      }

      if (v.stocks && v.stocks.length > 0) {
        html += `<div class="section">
          <div class="section-title">提及股票</div>
          <div class="stocks-list">
            ${v.stocks.map((s, i) => `<span class="stock-tag ${i > 0 ? 'secondary' : ''}">${s}</span>`).join('')}
          </div>
        </div>`;
      }

      if (v.investmentView) {
        html += `<div class="section">
          <div class="section-title">投资观点</div>
          <div class="section-content">${v.investmentView}</div>
        </div>`;
      }

      if (v.trades && v.trades.length > 0) {
        html += `<div class="section">
          <div class="section-title">交易动作</div>`;
        v.trades.forEach(t => {
          html += `<div class="trade-item">
            <span class="trade-action ${t.action}">${t.action}</span>
            <span class="trade-ticker">${t.ticker}</span>`;
          const details = [];
          if (t.positionSize) details.push(`仓位: ${t.positionSize}`);
          if (t.entryPrice) details.push(`均价: ${t.entryPrice}`);
          if (details.length) html += `<span class="trade-detail">${details.join(' | ')}</span>`;
          if (t.reasoning) html += `<div class="trade-reasoning">${t.reasoning}</div>`;
          html += `</div>`;
        });
        html += `</div>`;
      }

      if (v.independentAnalysis) {
        const ia = v.independentAnalysis;
        html += `<div class="section">
          <div class="section-title">独立分析</div>`;
        if (ia.summary) {
          html += `<div class="section-content" style="margin-bottom:12px;">${ia.summary}</div>`;
        }
        if (ia.stocks && ia.stocks.length > 0) {
          ia.stocks.forEach(s => {
            html += `<div class="analysis-card">
              <div class="analysis-ticker">${s.ticker}</div>`;
            if (s.fundamentals) html += `<div class="analysis-row"><span class="analysis-label">基本面：</span>${s.fundamentals}</div>`;
            if (s.bullCase) html += `<div class="analysis-row"><span class="analysis-label">看多：</span>${s.bullCase}</div>`;
            if (s.bearCase) html += `<div class="analysis-row"><span class="analysis-label">看空：</span>${s.bearCase}</div>`;
            if (s.risksNotMentioned) html += `<div class="analysis-row"><span class="risk-highlight"><span class="analysis-label">未提及风险：</span>${s.risksNotMentioned}</span></div>`;
            if (s.consensus) html += `<div class="analysis-row"><span class="analysis-label">分析师共识：</span>${s.consensus}</div>`;
            html += `</div>`;
          });
        }
        html += `</div>`;
      }

      html += `</div>`;
      return html;
    }

    init();
  </script>
</body>
</html>
